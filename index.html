<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Facturación</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.5px; }
    header span { font-size: 0.85rem; opacity: 0.7; }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Upload area */
    .upload-zone {
      background: white;
      border: 2px dashed #c0c8d8;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 32px;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #4f81f7;
      background: #f5f8ff;
    }
    .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-zone h2 { font-size: 1.1rem; color: #333; margin-bottom: 8px; }
    .upload-zone p { font-size: 0.85rem; color: #888; }
    .upload-zone .hint {
      display: inline-block;
      margin-top: 16px;
      background: #4f81f7;
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
    }
    #fileInput { display: none; }

    .column-map {
      background: white;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      display: none;
    }
    .column-map h3 { font-size: 1rem; margin-bottom: 16px; color: #444; }
    .column-map .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .column-map label { font-size: 0.8rem; color: #666; display: block; margin-bottom: 4px; }
    .column-map select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #fafafa;
    }
    .column-map button {
      margin-top: 20px;
      background: #4f81f7;
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .column-map button:hover { background: #3a6be0; }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 32px;
    }
    .kpi-card {
      background: white;
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      border-left: 4px solid #4f81f7;
    }
    .kpi-card.green { border-left-color: #22c55e; }
    .kpi-card.orange { border-left-color: #f59e0b; }
    .kpi-card.purple { border-left-color: #8b5cf6; }
    .kpi-card .label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
    .kpi-card .sub { font-size: 0.78rem; color: #aaa; margin-top: 4px; }

    /* Chart */
    .chart-card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      margin-bottom: 32px;
    }
    .chart-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; color: #333; }
    .chart-card canvas { max-height: 320px; }

    /* Brokers */
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 16px;
    }

    .broker-list { display: flex; flex-direction: column; gap: 12px; }

    .broker-card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .broker-header {
      display: flex;
      align-items: center;
      padding: 18px 24px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      gap: 16px;
    }
    .broker-header:hover { background: #f8f9ff; }

    .broker-avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f81f7, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 700; font-size: 1rem;
      flex-shrink: 0;
    }

    .broker-info { flex: 1; }
    .broker-info .name { font-weight: 600; font-size: 0.95rem; }
    .broker-info .meta { font-size: 0.78rem; color: #888; margin-top: 2px; }

    .broker-total {
      font-size: 1rem;
      font-weight: 700;
      color: #4f81f7;
      text-align: right;
    }
    .broker-total .label { font-size: 0.72rem; color: #aaa; font-weight: 400; display: block; }

    .broker-chevron {
      font-size: 1rem;
      color: #bbb;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .broker-card.open .broker-chevron { transform: rotate(180deg); }

    .broker-body {
      display: none;
      padding: 0 24px 20px;
      border-top: 1px solid #f0f0f0;
    }
    .broker-card.open .broker-body { display: block; }

    .client-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 0.88rem;
    }
    .client-table th {
      text-align: left;
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .client-table td {
      padding: 10px 0;
      border-bottom: 1px solid #f4f4f4;
      color: #333;
    }
    .client-table td.amount {
      font-weight: 600;
      color: #1a1a2e;
      text-align: right;
    }
    .client-table td.month { color: #888; font-size: 0.82rem; }
    .client-table tr:last-child td { border-bottom: none; }

    /* Month filter */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .filters label { font-size: 0.85rem; color: #666; }
    .filters select {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
    }

    .no-data {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 0.95rem;
    }

    .dashboard-content { display: none; }
    .dashboard-content.visible { display: block; }

    /* Colors for avatars */
    .color-0 { background: linear-gradient(135deg, #4f81f7, #8b5cf6); }
    .color-1 { background: linear-gradient(135deg, #22c55e, #16a34a); }
    .color-2 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .color-3 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
    .color-4 { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
    .color-5 { background: linear-gradient(135deg, #14b8a6, #6366f1); }

    .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #4f81f7;
      border-radius: 20px;
      font-size: 0.72rem;
      padding: 3px 10px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Dashboard de Facturación</h1>
  <span id="lastLoaded">Sin datos cargados</span>
</header>

<div class="container">

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📂</div>
    <h2>Carga tu archivo de facturación</h2>
    <p>Exporta tu Google Sheet como CSV o Excel (.xlsx) y súbelo aquí</p>
    <span class="hint">Seleccionar archivo</span>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
  </div>

  <!-- Column Mapper -->
  <div class="column-map" id="columnMap">
    <h3>🗂 Mapea tus columnas — ¿cuál columna es cada dato?</h3>
    <div class="grid">
      <div>
        <label>Fecha / Mes</label>
        <select id="colFecha"></select>
      </div>
      <div>
        <label>Broker / Agente</label>
        <select id="colBroker"></select>
      </div>
      <div>
        <label>Cliente</label>
        <select id="colCliente"></select>
      </div>
      <div>
        <label>Monto Facturado</label>
        <select id="colMonto"></select>
      </div>
    </div>
    <button onclick="applyMapping()">Generar Dashboard →</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard-content" id="dashboardContent">

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Chart -->
    <div class="chart-card">
      <h3>Facturación mensual comparativa</h3>
      <canvas id="monthChart"></canvas>
    </div>

    <!-- Brokers -->
    <div class="filters">
      <label>Filtrar por mes:</label>
      <select id="monthFilter" onchange="renderBrokers()">
        <option value="">Todos los meses</option>
      </select>
    </div>

    <div class="section-title">Brokers y sus clientes</div>
    <div class="broker-list" id="brokerList"></div>

  </div>
</div>

<script>
  let rawData = [];
  let colHeaders = [];
  let chartInstance = null;

  // Upload zone handlers
  const zone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      if (json.length < 2) { alert('El archivo parece vacío.'); return; }

      colHeaders = json[0].map(String);
      rawData = json.slice(1).filter(row => row.some(cell => cell !== ''));

      document.getElementById('lastLoaded').textContent = `${file.name} — ${rawData.length} filas`;
      showColumnMapper();
    };
    reader.readAsArrayBuffer(file);
  }

  function showColumnMapper() {
    const map = document.getElementById('columnMap');
    map.style.display = 'block';

    ['colFecha', 'colBroker', 'colCliente', 'colMonto'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = colHeaders.map((h, i) => `<option value="${i}">${h}</option>`).join('');
    });

    // Try to auto-detect columns
    autoDetect('colFecha', ['fecha', 'mes', 'date', 'month', 'periodo', 'period']);
    autoDetect('colBroker', ['broker', 'agente', 'agent', 'intermediario', 'vendedor', 'asesor']);
    autoDetect('colCliente', ['cliente', 'client', 'customer', 'nombre', 'name']);
    autoDetect('colMonto', ['monto', 'facturado', 'amount', 'total', 'valor', 'importe', 'precio']);
  }

  function autoDetect(selectId, keywords) {
    const sel = document.getElementById(selectId);
    const idx = colHeaders.findIndex(h =>
      keywords.some(k => h.toLowerCase().includes(k))
    );
    if (idx >= 0) sel.value = idx;
  }

  function applyMapping() {
    const iF = +document.getElementById('colFecha').value;
    const iB = +document.getElementById('colBroker').value;
    const iC = +document.getElementById('colCliente').value;
    const iM = +document.getElementById('colMonto').value;

    window.mapping = { fecha: iF, broker: iB, cliente: iC, monto: iM };

    const parsed = rawData.map(row => {
      const rawDate = row[iF];
      let mesLabel = '';

      if (rawDate instanceof Date) {
        mesLabel = rawDate.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
      } else if (typeof rawDate === 'number') {
        // Excel serial date
        const d = new Date((rawDate - 25569) * 86400 * 1000);
        mesLabel = d.toLocaleDateString('es-ES', { month: 'long', year: 'numeric' });
      } else {
        mesLabel = String(rawDate);
      }

      return {
        mes: mesLabel,
        broker: String(row[iB] || '').trim(),
        cliente: String(row[iC] || '').trim(),
        monto: parseFloat(String(row[iM]).replace(/[^0-9.-]/g, '')) || 0
      };
    }).filter(r => r.broker && r.monto > 0);

    window.parsedData = parsed;

    // Populate month filter
    const meses = [...new Set(parsed.map(r => r.mes))];
    const sel = document.getElementById('monthFilter');
    sel.innerHTML = '<option value="">Todos los meses</option>' +
      meses.map(m => `<option value="${m}">${capitalize(m)}</option>`).join('');

    renderKPIs(parsed);
    renderChart(parsed);
    renderBrokers();

    document.getElementById('dashboardContent').classList.add('visible');
    document.getElementById('columnMap').style.display = 'none';
    zone.style.display = 'none';
  }

  function renderKPIs(data) {
    const total = data.reduce((s, r) => s + r.monto, 0);
    const brokers = new Set(data.map(r => r.broker)).size;
    const clientes = new Set(data.map(r => r.cliente)).size;
    const meses = new Set(data.map(r => r.mes)).size;

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card">
        <div class="label">Total Facturado</div>
        <div class="value">${formatMoney(total)}</div>
        <div class="sub">${meses} mes(es) de datos</div>
      </div>
      <div class="kpi-card green">
        <div class="label">Brokers Activos</div>
        <div class="value">${brokers}</div>
        <div class="sub">intermediarios</div>
      </div>
      <div class="kpi-card orange">
        <div class="label">Clientes Únicos</div>
        <div class="value">${clientes}</div>
        <div class="sub">en total</div>
      </div>
      <div class="kpi-card purple">
        <div class="label">Promedio Mensual</div>
        <div class="value">${formatMoney(total / (meses || 1))}</div>
        <div class="sub">por mes</div>
      </div>
    `;
  }

  function renderChart(data) {
    const byMonth = {};
    data.forEach(r => {
      byMonth[r.mes] = (byMonth[r.mes] || 0) + r.monto;
    });

    const labels = Object.keys(byMonth).map(capitalize);
    const values = Object.values(byMonth);

    if (chartInstance) chartInstance.destroy();

    const ctx = document.getElementById('monthChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Facturado',
          data: values,
          backgroundColor: labels.map((_, i) =>
            `hsla(${220 + i * 25}, 75%, 58%, 0.85)`
          ),
          borderRadius: 8,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ' ' + formatMoney(ctx.raw)
            }
          }
        },
        scales: {
          y: {
            ticks: {
              callback: v => formatMoney(v)
            },
            grid: { color: '#f0f0f0' }
          },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderBrokers() {
    const filterMes = document.getElementById('monthFilter').value;
    const data = filterMes
      ? window.parsedData.filter(r => r.mes === filterMes)
      : window.parsedData;

    const brokerMap = {};
    data.forEach(r => {
      if (!brokerMap[r.broker]) brokerMap[r.broker] = { total: 0, rows: [] };
      brokerMap[r.broker].total += r.monto;
      brokerMap[r.broker].rows.push(r);
    });

    const sorted = Object.entries(brokerMap).sort((a, b) => b[1].total - a[1].total);

    const container = document.getElementById('brokerList');
    container.innerHTML = sorted.map(([broker, info], idx) => {
      const initials = broker.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      const clientCount = new Set(info.rows.map(r => r.cliente)).size;
      const colorClass = `color-${idx % 6}`;

      // Group by client
      const clientMap = {};
      info.rows.forEach(r => {
        if (!clientMap[r.cliente]) clientMap[r.cliente] = { total: 0, meses: [] };
        clientMap[r.cliente].total += r.monto;
        clientMap[r.cliente].meses.push(r.mes);
      });

      const clientRows = Object.entries(clientMap)
        .sort((a, b) => b[1].total - a[1].total)
        .map(([cliente, cInfo]) => {
          const mesesUnicos = [...new Set(cInfo.meses)].map(capitalize).join(', ');
          return `
            <tr>
              <td>${cliente}</td>
              <td class="month">${mesesUnicos}</td>
              <td class="amount">${formatMoney(cInfo.total)}</td>
            </tr>
          `;
        }).join('');

      return `
        <div class="broker-card" id="broker-${idx}">
          <div class="broker-header" onclick="toggleBroker(${idx})">
            <div class="broker-avatar ${colorClass}">${initials}</div>
            <div class="broker-info">
              <div class="name">${broker}</div>
              <div class="meta"><span class="badge">${clientCount} cliente(s)</span></div>
            </div>
            <div class="broker-total">
              ${formatMoney(info.total)}
              <span class="label">facturado</span>
            </div>
            <div class="broker-chevron">▼</div>
          </div>
          <div class="broker-body">
            <table class="client-table">
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Mes(es)</th>
                  <th style="text-align:right">Monto</th>
                </tr>
              </thead>
              <tbody>${clientRows}</tbody>
            </table>
          </div>
        </div>
      `;
    }).join('');
  }

  function toggleBroker(idx) {
    const card = document.getElementById(`broker-${idx}`);
    card.classList.toggle('open');
  }

  function formatMoney(n) {
    if (isNaN(n)) return '—';
    return new Intl.NumberFormat('es-ES', {
      style: 'currency',
      currency: 'USD',
      minimumFractionDigits: 0,
      maximumFractionDigits: 0
    }).format(n);
  }

  function capitalize(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
  }
</script>
</body>
</html>
