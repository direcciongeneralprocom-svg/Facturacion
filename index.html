<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard de Facturación</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    header h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: 0.5px; }
    header span { font-size: 0.85rem; opacity: 0.7; }

    .container { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

    /* Upload */
    .upload-zone {
      background: white;
      border: 2px dashed #c0c8d8;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 32px;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: #4f81f7; background: #f5f8ff; }
    .upload-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    .upload-zone h2 { font-size: 1.1rem; color: #333; margin-bottom: 8px; }
    .upload-zone p { font-size: 0.85rem; color: #888; }
    .upload-zone .hint {
      display: inline-block; margin-top: 16px;
      background: #4f81f7; color: white;
      padding: 10px 24px; border-radius: 8px;
      font-size: 0.9rem; font-weight: 500;
    }
    #fileInput { display: none; }

    /* Column mapper */
    .column-map {
      background: white; border-radius: 16px; padding: 28px;
      margin-bottom: 32px; box-shadow: 0 1px 6px rgba(0,0,0,0.07); display: none;
    }
    .column-map h3 { font-size: 1rem; margin-bottom: 16px; color: #444; }
    .column-map .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;
    }
    .column-map label { font-size: 0.8rem; color: #666; display: block; margin-bottom: 4px; }
    .column-map select {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.9rem; background: #fafafa;
    }
    .column-map button {
      margin-top: 20px; background: #4f81f7; color: white; border: none;
      padding: 11px 28px; border-radius: 8px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
    }
    .column-map button:hover { background: #3a6be0; }

    /* KPI cards */
    .kpi-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px; margin-bottom: 32px;
    }
    .kpi-card {
      background: white; border-radius: 14px; padding: 22px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07); border-left: 4px solid #4f81f7;
    }
    .kpi-card.green { border-left-color: #22c55e; }
    .kpi-card.orange { border-left-color: #f59e0b; }
    .kpi-card.purple { border-left-color: #8b5cf6; }
    .kpi-card .label { font-size: 0.78rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .kpi-card .value { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
    .kpi-card .sub { font-size: 0.78rem; color: #aaa; margin-top: 4px; }

    /* Chart */
    .chart-card {
      background: white; border-radius: 16px; padding: 28px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07); margin-bottom: 32px;
    }
    .chart-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 20px; color: #333; }
    .chart-card canvas { max-height: 320px; }

    /* Section title */
    .section-title {
      font-size: 1rem; font-weight: 600; color: #333; margin-bottom: 16px;
    }

    /* Main comparison table */
    .table-wrapper {
      background: white; border-radius: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.07);
      overflow-x: auto;
    }

    .main-table {
      width: 100%; border-collapse: collapse; font-size: 0.88rem; min-width: 700px;
    }

    .main-table thead tr {
      background: #1a1a2e; color: white;
    }
    .main-table thead th {
      padding: 14px 16px; text-align: right;
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .main-table thead th:first-child { text-align: left; min-width: 220px; }

    /* Broker rows */
    .broker-row {
      background: #fffde7;
      cursor: pointer;
      user-select: none;
    }
    .broker-row:hover { background: #fff9c4; }
    .broker-row td {
      padding: 13px 16px; border-bottom: 1px solid #e8e8e8;
      font-weight: 700; font-size: 0.9rem; color: #1a1a2e;
    }
    .broker-row td:first-child { text-align: left; }
    .broker-row td:not(:first-child) { text-align: right; }

    /* Client rows */
    .client-row td {
      padding: 10px 16px; border-bottom: 1px solid #f4f4f4;
      font-size: 0.86rem; color: #444;
    }
    .client-row td:first-child { text-align: left; padding-left: 36px; color: #333; }
    .client-row td:not(:first-child) { text-align: right; }
    .client-row:last-of-type td { border-bottom: 2px solid #e0e0e0; }

    /* Chevron */
    .chevron {
      display: inline-block; transition: transform 0.2s;
      font-size: 0.7rem; margin-right: 6px; color: #999;
    }
    .broker-row.open .chevron { transform: rotate(90deg); }

    /* Diff colors */
    .neg { color: #dc2626 !important; font-weight: 600; }
    .pos { color: #16a34a !important; font-weight: 600; }
    .neutral { color: #888 !important; }

    /* Type badge */
    .type-cell {
      font-size: 0.72rem; font-weight: 600; text-align: center !important;
      white-space: nowrap;
    }
    .badge-broker {
      background: #1a1a2e; color: white;
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem;
    }
    .badge-client {
      background: #e8f0fe; color: #4f81f7;
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem;
    }

    /* Amount cells */
    .amt { white-space: nowrap; }
    .amt-zero { color: #bbb; }

    .dashboard-content { display: none; }
    .dashboard-content.visible { display: block; }

    /* Reload button */
    .reload-btn {
      display: inline-block; margin-bottom: 20px;
      background: white; border: 1px solid #ddd;
      padding: 8px 18px; border-radius: 8px; font-size: 0.85rem;
      color: #555; cursor: pointer; transition: all 0.15s;
    }
    .reload-btn:hover { background: #f5f8ff; border-color: #4f81f7; color: #4f81f7; }
  </style>
</head>
<body>

<header>
  <h1>📊 Dashboard de Facturación</h1>
  <span id="lastLoaded">Sin datos cargados</span>
</header>

<div class="container">

  <!-- Upload Zone -->
  <div class="upload-zone" id="uploadZone">
    <div class="icon">📂</div>
    <h2>Carga tu archivo de facturación</h2>
    <p>Exporta tu Google Sheet como CSV o Excel (.xlsx) y súbelo aquí</p>
    <span class="hint">Seleccionar archivo</span>
    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" />
  </div>

  <!-- Column Mapper -->
  <div class="column-map" id="columnMap">
    <h3>🗂 Mapea tus columnas — ¿cuál columna es cada dato?</h3>
    <div class="grid">
      <div>
        <label>Fecha / Mes</label>
        <select id="colFecha"></select>
      </div>
      <div>
        <label>Broker / Agente</label>
        <select id="colBroker"></select>
      </div>
      <div>
        <label>Cliente</label>
        <select id="colCliente"></select>
      </div>
      <div>
        <label>Monto Facturado</label>
        <select id="colMonto"></select>
      </div>
    </div>
    <button onclick="applyMapping()">Generar Dashboard →</button>
  </div>

  <!-- Dashboard -->
  <div class="dashboard-content" id="dashboardContent">

    <button class="reload-btn" onclick="reloadFile()">↩ Cargar otro archivo</button>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- Chart -->
    <div class="chart-card">
      <h3>Facturación mensual comparativa</h3>
      <canvas id="monthChart"></canvas>
    </div>

    <!-- Brokers table -->
    <div class="section-title">Brokers y sus clientes — comparativo por mes</div>
    <div class="table-wrapper">
      <table class="main-table" id="brokerTable">
        <thead id="brokerTableHead"></thead>
        <tbody id="brokerTableBody"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
  let rawData = [];
  let colHeaders = [];
  let chartInstance = null;

  const MONTH_ORDER = ['enero','febrero','marzo','abril','mayo','junio',
                       'julio','agosto','septiembre','octubre','noviembre','diciembre'];

  const zone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');

  zone.addEventListener('click', () => fileInput.click());
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag-over');
    handleFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  function handleFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      if (json.length < 2) { alert('El archivo parece vacío.'); return; }
      colHeaders = json[0].map(String);
      rawData = json.slice(1).filter(row => row.some(cell => cell !== ''));
      document.getElementById('lastLoaded').textContent = `${file.name} — ${rawData.length} filas`;
      showColumnMapper();
    };
    reader.readAsArrayBuffer(file);
  }

  function showColumnMapper() {
    const map = document.getElementById('columnMap');
    map.style.display = 'block';
    ['colFecha','colBroker','colCliente','colMonto'].forEach(id => {
      const sel = document.getElementById(id);
      sel.innerHTML = colHeaders.map((h,i) => `<option value="${i}">${h}</option>`).join('');
    });
    autoDetect('colFecha',   ['fecha','mes','date','month','periodo','period']);
    autoDetect('colBroker',  ['broker','agente','agent','intermediario','vendedor','asesor']);
    autoDetect('colCliente', ['cliente','client','customer','nombre','name']);
    autoDetect('colMonto',   ['monto','facturado','amount','total','valor','importe','precio']);
  }

  function autoDetect(id, keywords) {
    const sel = document.getElementById(id);
    const idx = colHeaders.findIndex(h => keywords.some(k => h.toLowerCase().includes(k)));
    if (idx >= 0) sel.value = idx;
  }

  function applyMapping() {
    const iF = +document.getElementById('colFecha').value;
    const iB = +document.getElementById('colBroker').value;
    const iC = +document.getElementById('colCliente').value;
    const iM = +document.getElementById('colMonto').value;

    const parsed = rawData.map(row => {
      const rawDate = row[iF];
      let mesLabel = '';
      if (rawDate instanceof Date) {
        mesLabel = rawDate.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
      } else if (typeof rawDate === 'number' && rawDate > 1000) {
        const d = new Date((rawDate - 25569) * 86400 * 1000);
        mesLabel = d.toLocaleDateString('es-MX', { month: 'long', year: 'numeric' });
      } else {
        mesLabel = String(rawDate).trim();
      }
      return {
        mes: mesLabel.toLowerCase(),
        broker: String(row[iB] || '').trim().toUpperCase(),
        cliente: String(row[iC] || '').trim().toUpperCase(),
        monto: parseFloat(String(row[iM]).replace(/[^0-9.-]/g, '')) || 0
      };
    }).filter(r => r.broker && r.monto > 0);

    window.parsedData = parsed;

    renderKPIs(parsed);
    renderChart(parsed);
    renderBrokersTable(parsed);

    document.getElementById('dashboardContent').classList.add('visible');
    document.getElementById('columnMap').style.display = 'none';
    zone.style.display = 'none';
  }

  function getOrderedMonths(data) {
    const months = [...new Set(data.map(r => r.mes))];
    return months.sort((a, b) => {
      const parse = str => {
        str = str.toLowerCase().trim();
        const parts = str.split(/\s+/);
        const mIdx = MONTH_ORDER.findIndex(m => parts[0].startsWith(m.slice(0,3)));
        const year = parseInt(parts.find(p => /^\d{4}$/.test(p))) || 0;
        return year * 12 + (mIdx >= 0 ? mIdx : 99);
      };
      return parse(a) - parse(b);
    });
  }

  function renderKPIs(data) {
    const total = data.reduce((s,r) => s + r.monto, 0);
    const brokers = new Set(data.map(r => r.broker)).size;
    const clientes = new Set(data.map(r => r.cliente)).size;
    const meses = new Set(data.map(r => r.mes)).size;
    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card">
        <div class="label">Total Facturado</div>
        <div class="value">${formatMoney(total)}</div>
        <div class="sub">${meses} mes(es) de datos</div>
      </div>
      <div class="kpi-card green">
        <div class="label">Brokers Activos</div>
        <div class="value">${brokers}</div>
        <div class="sub">intermediarios</div>
      </div>
      <div class="kpi-card orange">
        <div class="label">Clientes Únicos</div>
        <div class="value">${clientes}</div>
        <div class="sub">en total</div>
      </div>
      <div class="kpi-card purple">
        <div class="label">Promedio Mensual</div>
        <div class="value">${formatMoney(total / (meses || 1))}</div>
        <div class="sub">por mes</div>
      </div>
    `;
  }

  function renderChart(data) {
    const byMonth = {};
    const months = getOrderedMonths(data);
    months.forEach(m => byMonth[m] = 0);
    data.forEach(r => { byMonth[r.mes] = (byMonth[r.mes] || 0) + r.monto; });

    if (chartInstance) chartInstance.destroy();
    const ctx = document.getElementById('monthChart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: months.map(cap),
        datasets: [{
          label: 'Facturado',
          data: months.map(m => byMonth[m]),
          backgroundColor: months.map((_,i) => `hsla(${220 + i*30}, 70%, 55%, 0.85)`),
          borderRadius: 8, borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => ' ' + formatMoney(c.raw) } }
        },
        scales: {
          y: { ticks: { callback: v => formatMoney(v) }, grid: { color: '#f0f0f0' } },
          x: { grid: { display: false } }
        }
      }
    });
  }

  function renderBrokersTable(data) {
    const allMonths = getOrderedMonths(data);
    const lastTwo = allMonths.slice(-2);
    const hasDiff = lastTwo.length === 2;

    // Build map: broker -> { byMonth, clients: { cliente -> byMonth } }
    const brokerMap = {};
    data.forEach(r => {
      if (!brokerMap[r.broker]) brokerMap[r.broker] = { byMonth: {}, clients: {} };
      brokerMap[r.broker].byMonth[r.mes] = (brokerMap[r.broker].byMonth[r.mes] || 0) + r.monto;
      if (!brokerMap[r.broker].clients[r.cliente])
        brokerMap[r.broker].clients[r.cliente] = { byMonth: {} };
      brokerMap[r.broker].clients[r.cliente].byMonth[r.mes] =
        (brokerMap[r.broker].clients[r.cliente].byMonth[r.mes] || 0) + r.monto;
    });

    const sorted = Object.entries(brokerMap).sort((a,b) => {
      const tA = Object.values(a[1].byMonth).reduce((s,v)=>s+v,0);
      const tB = Object.values(b[1].byMonth).reduce((s,v)=>s+v,0);
      return tB - tA;
    });

    // Header
    const monthThs = allMonths.map(m => `<th>${cap(m)}</th>`).join('');
    const diffThs = hasDiff ? `<th>DIFERENCIA</th><th>% CAMBIO</th>` : '';
    document.getElementById('brokerTableHead').innerHTML = `
      <tr>
        <th>BROKER / CLIENTE</th>
        ${monthThs}
        ${diffThs}
        <th>TIPO</th>
      </tr>
    `;

    // Body
    let bodyHtml = '';
    sorted.forEach(([broker, info], idx) => {
      const brokerMonthCells = allMonths.map(m => {
        const v = info.byMonth[m] || 0;
        return `<td class="amt${v ? '' : ' amt-zero'}">${v ? formatMoney(v) : '—'}</td>`;
      }).join('');

      let diffCells = '';
      if (hasDiff) {
        const prev = info.byMonth[lastTwo[0]] || 0;
        const curr = info.byMonth[lastTwo[1]] || 0;
        const diff = curr - prev;
        const pct  = prev > 0 ? diff / prev * 100 : null;
        diffCells = `
          <td class="amt ${diff < 0 ? 'neg' : diff > 0 ? 'pos' : 'neutral'}">${formatDiff(diff)}</td>
          <td class="${diff < 0 ? 'neg' : diff > 0 ? 'pos' : 'neutral'}">${pct !== null ? formatPct(pct) : '—'}</td>
        `;
      }

      bodyHtml += `
        <tr class="broker-row" id="brow-${idx}" onclick="toggleBroker(${idx})">
          <td><span class="chevron" id="chev-${idx}">▶</span>${broker}</td>
          ${brokerMonthCells}
          ${diffCells}
          <td class="type-cell"><span class="badge-broker">Broker</span></td>
        </tr>
      `;

      // Clients sorted by total
      const clientsSorted = Object.entries(info.clients).sort((a,b) => {
        const tA = Object.values(a[1].byMonth).reduce((s,v)=>s+v,0);
        const tB = Object.values(b[1].byMonth).reduce((s,v)=>s+v,0);
        return tB - tA;
      });

      clientsSorted.forEach(([cliente, cInfo]) => {
        const clientMonthCells = allMonths.map(m => {
          const v = cInfo.byMonth[m] || 0;
          return `<td class="amt${v ? '' : ' amt-zero'}">${v ? formatMoney(v) : '—'}</td>`;
        }).join('');

        let clientDiffCells = '';
        if (hasDiff) {
          const prev = cInfo.byMonth[lastTwo[0]] || 0;
          const curr = cInfo.byMonth[lastTwo[1]] || 0;
          const diff = curr - prev;
          const pct  = prev > 0 ? diff / prev * 100 : null;
          clientDiffCells = `
            <td class="amt ${diff < 0 ? 'neg' : diff > 0 ? 'pos' : 'neutral'}">${formatDiff(diff)}</td>
            <td class="${diff < 0 ? 'neg' : diff > 0 ? 'pos' : 'neutral'}">${pct !== null ? formatPct(pct) : '—'}</td>
          `;
        }

        bodyHtml += `
          <tr class="client-row" data-broker="${idx}" style="display:none">
            <td>${cliente}</td>
            ${clientMonthCells}
            ${clientDiffCells}
            <td class="type-cell"><span class="badge-client">Cliente</span></td>
          </tr>
        `;
      });
    });

    document.getElementById('brokerTableBody').innerHTML = bodyHtml;
  }

  function toggleBroker(idx) {
    const brokerRow = document.getElementById(`brow-${idx}`);
    const chevron   = document.getElementById(`chev-${idx}`);
    const isOpen    = brokerRow.classList.toggle('open');
    chevron.style.transform = isOpen ? 'rotate(90deg)' : '';
    document.querySelectorAll(`.client-row[data-broker="${idx}"]`).forEach(r => {
      r.style.display = isOpen ? '' : 'none';
    });
  }

  function reloadFile() {
    document.getElementById('dashboardContent').classList.remove('visible');
    document.getElementById('uploadZone').style.display = '';
    document.getElementById('columnMap').style.display = 'none';
    document.getElementById('lastLoaded').textContent = 'Sin datos cargados';
    fileInput.value = '';
  }

  /* ---- Formatters ---- */
  function formatMoney(n) {
    if (isNaN(n) || n === 0) return '—';
    return new Intl.NumberFormat('es-MX', {
      style: 'currency', currency: 'MXN',
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }).format(n);
  }

  function formatDiff(diff) {
    if (diff === 0) return '—';
    const abs = Math.abs(diff);
    const fmt = new Intl.NumberFormat('es-MX', {
      style: 'currency', currency: 'MXN',
      minimumFractionDigits: 2, maximumFractionDigits: 2
    }).format(abs);
    return diff < 0 ? `(${fmt})` : `+${fmt}`;
  }

  function formatPct(pct) {
    if (pct === null) return '—';
    const abs = Math.abs(pct).toFixed(1);
    return pct < 0 ? `(${abs}%)` : `+${abs}%`;
  }

  function cap(str) {
    if (!str) return '';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }
</script>
</body>
</html>
